name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag, for example v0.1.1"
        required: true
      target_commitish:
        description: "Branch or commit to release from"
        required: false
        default: "main"

permissions:
  contents: write

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "10.33.2"

jobs:
  prepare:
    name: Prepare release metadata
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.meta.outputs.release_tag }}
      release_version: ${{ steps.meta.outputs.release_version }}
      target_ref: ${{ steps.meta.outputs.target_ref }}
    steps:
      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.release_tag }}"
            TARGET_REF="${{ github.event.inputs.target_commitish }}"
          else
            TAG="${GITHUB_REF_NAME}"
            TARGET_REF="${GITHUB_SHA}"
          fi

          if [[ ! "$TAG" =~ ^v[0-9].* ]]; then
            echo "Release tag must start with v, got: $TAG" >&2
            exit 1
          fi

          VERSION="${TAG#v}"

          echo "release_tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "release_version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "target_ref=$TARGET_REF" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.label }}
    needs: prepare
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            label: macOS
            artifact_name: release-macos
            dist_args: --mac dmg zip --publish never
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.target_ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm --dir frontend install --frozen-lockfile

      - name: Sync package version from tag
        shell: bash
        env:
          RELEASE_VERSION: ${{ needs.prepare.outputs.release_version }}
        run: |
          node <<'NODE'
          const fs = require('fs');
          const packagePath = 'frontend/package.json';
          const packageJson = JSON.parse(fs.readFileSync(packagePath, 'utf8'));
          packageJson.version = process.env.RELEASE_VERSION;
          fs.writeFileSync(packagePath, `${JSON.stringify(packageJson, null, 2)}\n`);
          NODE

      - name: Type check
        run: pnpm --dir frontend run typecheck

      - name: Build web bundle
        run: pnpm --dir frontend run build:web

      - name: Build release artifacts
        shell: bash
        run: pnpm --dir frontend run dist -- ${{ matrix.dist_args }}

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: frontend/release/**/*
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    needs:
      - prepare
      - build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: release-assets

      - name: Verify packaged files
        shell: bash
        run: |
          find release-assets -type f \( -name '*.zip' -o -name '*.dmg' \) | sort | tee release-files.txt
          test -s release-files.txt

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.release_tag }}
          target_commitish: ${{ needs.prepare.outputs.target_ref }}
          generate_release_notes: true
          files: |
            release-assets/**/*.zip
            release-assets/**/*.dmg
